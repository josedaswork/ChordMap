name: Build and Deploy Chordmap App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/core@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter and Compile Check
      run: npm run lint

    - name: Build Web Application
      run: npm run build

    - name: Sync with Capacitor (Native Assets)
      run: |
        # In a real GitHub Actions environment, you would run:
        # npx cap sync
        echo "Capacitor webDir 'dist' built successfully. Ready for Capacitor sync."
