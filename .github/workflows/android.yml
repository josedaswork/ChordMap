name: Android Build & Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build ChordMap APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build React Web App
        run: npm run build

      - name: Sync Capacitor Android Config
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode signing keystore or generate fallback
        working-directory: android
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore || true
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating fallback debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Replace App Icons with ChordMap Logo
        run: npx tsx src/utils/setup-logos.ts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          build-root-directory: android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Archive APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChordMap-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: "ChordMap Pro (APK) - Última Compilación"
          body: |
            ### 📱 ChordMap Pro Autocompilado
            ¡Aquí tienes la última versión autocompilada de ChordMap Pro lista para instalar en tu dispositivo Android!
            
            **Características de esta versión:**
            - 🎨 Interfaz moderna (Neo-Brutalist).
            - ☁️ Sincronización segura y en tiempo real con Google Sheets.
            - 🎸 Soporte completo para acordes con pulsos de tiempo y tablaturas interactivas de 6 cuerdas con adornos (hammer-on, pull-off, bends, etc.).
            
            *Nota: Al instalar, si tu dispositivo te advierte sobre una fuente desconocida, puedes darle permiso con total seguridad ya que es una compilación propia.*
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
