name: Android Build & Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test Android Application
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React Web App
        run: npm run build

      - name: Sync with Capacitor
        run: npx cap sync

      - name: Recreate Debug Keystore
        working-directory: android
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Recreating debug.keystore from base64..."
            base64 --decode debug.keystore.base64 > debug.keystore || base64 -d debug.keystore.base64 > debug.keystore || echo "Base64 decode failed"
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating a new fallback one with keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Replace App Icons with ChordMap Logo
        run: npx tsx src/utils/setup-logos.ts

      - name: Restore Gradle Wrapper Jar
        working-directory: android
        run: |
          echo "Downloading standard gradle-wrapper.jar to ensure it is not corrupt..."
          mkdir -p gradle/wrapper
          curl -L -f -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar

      - name: Run Build and Compile APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK for Artifact Export
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ChordMap-Debug.apk
          else
            echo "app-debug.apk not found in default location, searching..."
            find android/app/build/outputs/ -name "*.apk"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ChordMap-Debug-APK
          path: android/app/build/outputs/apk/debug/ChordMap-Debug.apk

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: "ChordMap Pro (APK) - Última Compilación"
          body: |
            ### 📱 ChordMap Pro Autocompilado
            ¡Aquí tienes la última versión autocompilada de ChordMap Pro lista para instalar en tu dispositivo Android!
            
            **Características de esta versión:**
            - 🎨 Interfaz moderna (Neo-Brutalist).
            - ☁️ Sincronización segura y en tiempo real con Google Sheets.
            - 🎸 Soporte completo para acordes con pulsos de tiempo y tablaturas interactivas de 6 cuerdas con adornos (hammer-on, pull-off, bends, etc.).
            
            *Nota: Al instalar, si tu dispositivo te advierte sobre una fuente desconocida, puedes darle permiso con total seguridad ya que es una compilación propia.*
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/debug/ChordMap-Debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
