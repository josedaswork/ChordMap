name: Android Build & Package

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode signing keystore or generate fallback
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore || true
          fi
          if [ ! -f "debug.keystore" ]; then
            echo "debug.keystore not found, generating fallback debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper # falls back to standard Gradle if wrapper is missing

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Archive APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcordesYTabs-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
